<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Page</title>
    <style>
        /* Делаем страницу красивой даже с мобилы */
        body { 
            margin: 0; 
            background: #000; 
            color: #444; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: sans-serif;
            user-select: none; /* Чтобы не выделялся текст при тапах */
        }
    </style>
</head>
<body>

    <h2>Жми в любое место...</h2>

    <audio id="track" loop>
        <source https://files.catbox.moe/x0f138.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('track');
        
        // Список всех действий, на которые сработает звук
        const actions = ['click', 'touchstart', 'scroll', 'keydown'];

        function playMusic() {
            audio.play().then(() => {
                // Если заиграло, удаляем слежку, чтобы не перезапускалось
                actions.forEach(event => {
                    window.removeEventListener(event, playMusic);
                });
                document.querySelector('h2').style.display = 'none';
            }).catch(error => {
                console.log("Ждем первого клика...");
            });
        }

        // Вешаем слушателей на все действия
        actions.forEach(event => {
            window.addEventListener(event, playMusic);
        });
    </script>

</body>
</html>
